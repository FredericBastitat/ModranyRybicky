app = 'rybicky-cloud'
primary_region = 'fra'

[http_service]
  internal_port = 8080
  force_https = false
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1

[env]
  AUTH_TOKEN = "zmen-me-prosim" # Doporučuji změnit přes fly secrets set
  LIMIT_GB = "50"               # Měsíční limit přenesených dat (Fly Free Tier má 160GB celkem)
  MAX_VIEWERS = "2"             # Omezení počtu paralelních streamů pro úsporu dat
  MAX_FPS = "12"                # Snížení FPS výrazně šetří bandwidth